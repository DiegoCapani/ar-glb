<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Selfie - Unique Saves</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Pulsante scatto estetico */
        #bottone-scatto {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            border: 5px solid rgba(0,0,0,0.3);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #bottone-scatto:active {
            background: #ff4444;
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="bottone-scatto"></div>

    <a-scene embedded 
             renderer="preserveDrawingBuffer: true;" 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="modello-1" src="man.glb"></a-asset-item>
        </a-assets>

        <a-marker type="barcode" value="1">
            <a-entity gltf-model="#modello-1" scale="6 6 6" position="0 0 0" rotation="0 90 0"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        document.getElementById('bottone-scatto').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            const video = document.querySelector('#arjs-video');
            const canvasAR = scene.canvas;

            // 1. Prepariamo il canvas della foto (Verticale)
            const fotoCanvas = document.createElement('canvas');
            
            // Usiamo le dimensioni visive dello schermo per il selfie perfetto
            fotoCanvas.width = canvasAR.width;
            fotoCanvas.height = canvasAR.height;
            const ctx = fotoCanvas.getContext('2d');

            // 2. Disegniamo la webcam adattandola allo schermo (Cover)
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoRatio = vWidth / vHeight;
            const canvasRatio = fotoCanvas.width / fotoCanvas.height;

            let sx, sy, sw, sh;
            if (videoRatio > canvasRatio) {
                sw = vHeight * canvasRatio;
                sh = vHeight;
                sx = (vWidth - sw) / 2;
                sy = 0;
            } else {
                sw = vWidth;
                sh = vWidth / canvasRatio;
                sx = 0;
                sy = (vHeight - sh) / 2;
            }

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, fotoCanvas.width, fotoCanvas.height);

            // 3. Renderizziamo il 3D sopra
            scene.renderer.render(scene.object3D, scene.camera);
            ctx.drawImage(canvasAR, 0, 0, fotoCanvas.width, fotoCanvas.height);

            // 4. SALVATAGGIO UNICO (Timestamp)
            // Creiamo un nome file basato sulla data e ora corrente: es. AR_20260331_194522.png
            const ora = new Date();
            const dataStringa = ora.getFullYear() + 
                                ("0" + (ora.getMonth() + 1)).slice(-2) + 
                                ("0" + ora.getDate()).slice(-2) + "_" + 
                                ("0" + ora.getHours()).slice(-2) + 
                                ("0" + ora.getMinutes()).slice(-2) + 
                                ("0" + ora.getSeconds()).slice(-2);

            const link = document.createElement('a');
            link.download = `AR_Selfie_${dataStringa}.png`; // Nome file dinamico
            link.href = fotoCanvas.toDataURL("image/png");
            link.click();
        });
    </script>
</body>
</html>
