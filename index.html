<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Hologram Installation</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-shader@1.1.4/dist/aframe-chromakey-shader.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Correzione per il video della webcam: evita lo zoom e riempie lo schermo correttamente */
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Messaggio a schermo per l'utente */
        #ar-instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 14px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="ar-instructions">Inquadra il marker HIRO e TOCCA per avviare</div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; 
              debugUIEnabled: false; 
              sourceWidth:1280; sourceHeight:720; 
              displayWidth:1280; displayHeight:720;">

<a-assets>
    <video id="ologramma" 
           src="video.mp4" 
           preload="auto" 
           loop="true" 
           autoplay 
           muted 
           playsinline 
           webkit-playsinline 
           crossorigin="anonymous">
    </video>
</a-assets>

        <a-marker preset="hiro">
            
            <a-plane 
                src="#ologramma" 
                position="0 0.8 0" 
                rotation="-90 0 0" 
                width="1.2" 
                height="2.1" 
                material="shader: chromakey; color: 0 0 0; transparent: true; opacity: 1; side: double;">
            </a-plane>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#ologramma');
        const instruction = document.querySelector('#ar-instructions');

        // FUNZIONE DI AVVIO FORZATO
        // I browser mobile bloccano l'autoplay dei video se non c'è un'azione umana (tocco).
        window.addEventListener('click', function() {
            video.play();
            // Nasconde le istruzioni una volta avviato
            instruction.style.display = 'none';
        }, { once: true });

        // Tenta l'avvio automatico al caricamento (funziona solo se il video è 'muted')
        window.addEventListener('load', function () {
            video.play().catch(function(err) {
                console.log("Autoplay in attesa di interazione utente.");
            });
        });
    </script>

</body>
</html>
