<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Selfie Pro - Plane Version</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <style>
        body { margin:0; overflow:hidden; font-family:sans-serif; }
        #scatta {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            width:85px; height:85px; border-radius:50%; background:white;
            border:6px solid black; z-index:999; cursor: pointer;
        }
        #countdown {
            position:fixed; top:40%; width:100%; text-align:center;
            font-size:120px; color:white; text-shadow:0 0 20px black;
            font-weight: bold; z-index:1000; display:none; pointer-events: none;
        }
    </style>
</head>

<body>

<div id="scatta"></div>
<div id="countdown"></div>

<a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="logarithmicDepthBuffer:true; alpha:true; preserveDrawingBuffer:true; antialias: true;"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false; canvasWidth:1280; canvasHeight:720;">

    <a-assets>
       <img id="artista-img" src="assets/luzzetti.png" crossorigin="anonymous">
    </a-assets>

    <a-marker preset="hiro" 
              smooth="true" 
              smoothCount="10" 
              keep-visible
              id="marker">

        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 3 2" intensity="0.8"></a-light>

        <a-entity id="wrapper" rotation="0 0 0">
        <a-plane
            id="personaggio"
            material="src: #artista-img; transparent: true; alphaTest: 0.5; shader: flat; side: double;"
            position="0 0 0"
            width="1" 
            height="1.75"
            vertical-look-at>
        </a-plane>
    </a-entity>

    </a-marker>

    <a-entity id="main-camera" camera="far: 10000; near: 0.1;"></a-entity>

</a-scene>

<script>
    // COMPONENTE PER NON FAR SPARIRE IL MODELLO (Ghost Effect)
    AFRAME.registerComponent('keep-visible', {
        init: function () {
            let marker = this.el;
            let entity = this.el.querySelector('#wrapper');
            
            marker.addEventListener('markerFound', function() {
                entity.setAttribute('visible', true);
            });

            marker.addEventListener('markerLost', function() {
                entity.setAttribute('visible', true);
            });
        }
    });

    // COMPONENTE LOOK-AT VERTICALE
    AFRAME.registerComponent('vertical-look-at', {
        tick: function () {
            const target = document.querySelector('#main-camera');
            if (!target) return;
            const targetPos = target.object3D.position;
            const myPos = this.el.object3D.position;
            this.el.object3D.lookAt(targetPos.x, myPos.y, targetPos.z);
        }
    });

    // LOGICA SCATTO E COUNTDOWN
    const btn = document.getElementById("scatta");
    const countdownEl = document.getElementById("countdown");

    btn.onclick = async () => {
        btn.style.pointerEvents = "none";
        for(let i=3; i>0; i--){
            countdownEl.style.display="block";
            countdownEl.innerText=i;
            await new Promise(r=>setTimeout(r,1000));
        }
        countdownEl.style.display="none";
        scattaFoto();
        btn.style.pointerEvents = "auto";
    };
